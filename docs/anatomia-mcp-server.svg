<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="630" viewBox="0 0 1600 630" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="bi" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 z" fill="#2f6f73"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 z" fill="#4b2e22"/></marker>
  </defs>
  <rect x="0" y="0" width="1600" height="630" fill="#fff8ee"/>
  <text x="800" y="38" text-anchor="middle" font-size="27" font-weight="700" fill="#1c4446">Anatomía de un MCP Server — qué contiene</text>
  <text x="800" y="61" text-anchor="middle" font-size="15" fill="#2f6f73">3 primitivas (Tools · Resources · Prompts) + transporte + features bidireccionales</text>

  <!-- CLIENTE -->
  <rect x="620" y="84" width="360" height="50" rx="10" fill="#3a5a8c"/>
  <text x="800" y="115" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">🤖 CLIENTE  (agente / LLM)</text>

  <!-- transporte (línea bidireccional + pill encima) -->
  <line x1="800" y1="134" x2="800" y2="205" stroke="#2f6f73" stroke-width="2.5" marker-start="url(#bi)" marker-end="url(#bi)"/>
  <rect x="470" y="150" width="660" height="30" rx="15" fill="#d7ecee" stroke="#2f6f73"/>
  <text x="800" y="170" text-anchor="middle" font-size="12.5" fill="#1c4446">TRANSPORTE: stdio (local) · Streamable HTTP (remoto) — JSON-RPC 2.0 · OAuth 2.1</text>

  <!-- MCP SERVER box -->
  <rect x="110" y="205" width="1380" height="300" rx="14" fill="#eef6f6" stroke="#2f6f73" stroke-width="2"/>
  <text x="130" y="234" font-size="17" font-weight="700" fill="#1c4446">🔌 MCP SERVER</text>
  <text x="320" y="234" font-size="13" fill="#3a6b6e">name: "ledger" · version: 1.0.0 · negocia "capabilities" al conectar</text>

  <!-- ===== Card TOOLS ===== -->
  <rect x="135" y="252" width="415" height="205" rx="10" fill="#ffffff" stroke="#2f6f73"/>
  <rect x="135" y="252" width="415" height="36" rx="10" fill="#2f6f73"/>
  <text x="342" y="276" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">🔧 TOOLS</text>
  <g font-size="12.8" fill="#28323f">
    <text x="152" y="312">acciones que el agente <tspan font-weight="700">LLAMA</tspan></text>
    <text x="152" y="334">= schema (lo que ve el LLM)</text>
    <text x="152" y="354">  + executor (el código real)</text>
  </g>
  <rect x="152" y="368" width="250" height="22" rx="11" fill="#e2efef"/><text x="277" y="383" text-anchor="middle" font-size="11" fill="#1c4446">MODEL-controlled (el modelo decide)</text>
  <text x="152" y="425" font-size="12" fill="#3a6b6e" font-family="monospace">ej: conciliar_pago(pedido_id)</text>

  <!-- ===== Card RESOURCES ===== -->
  <rect x="592" y="252" width="415" height="205" rx="10" fill="#ffffff" stroke="#2e7d6b"/>
  <rect x="592" y="252" width="415" height="36" rx="10" fill="#2e7d6b"/>
  <text x="799" y="276" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">📄 RESOURCES</text>
  <g font-size="12.8" fill="#28323f">
    <text x="609" y="312">datos / contexto que se <tspan font-weight="700">LEEN</tspan> (read-only)</text>
    <text x="609" y="334">= archivos, filas de DB,</text>
    <text x="609" y="354">  docs, logs, configs...</text>
  </g>
  <rect x="609" y="368" width="270" height="22" rx="11" fill="#e3f1ec"/><text x="744" y="383" text-anchor="middle" font-size="11" fill="#1d5247">APP / USUARIO decide qué cargar</text>
  <text x="609" y="425" font-size="12" fill="#1d5247" font-family="monospace">ej: file://ledger/2026-06.csv</text>

  <!-- ===== Card PROMPTS ===== -->
  <rect x="1049" y="252" width="415" height="205" rx="10" fill="#ffffff" stroke="#b8753a"/>
  <rect x="1049" y="252" width="415" height="36" rx="10" fill="#b8753a"/>
  <text x="1256" y="276" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">💬 PROMPTS</text>
  <g font-size="12.8" fill="#28323f">
    <text x="1066" y="312">plantillas de prompt reutilizables</text>
    <text x="1066" y="334">= como un slash-command</text>
    <text x="1066" y="354">  con parámetros</text>
  </g>
  <rect x="1066" y="368" width="200" height="22" rx="11" fill="#f6e7d6"/><text x="1166" y="383" text-anchor="middle" font-size="11" fill="#7a4a22">USUARIO lo invoca</text>
  <text x="1066" y="425" font-size="12" fill="#7a4a22" font-family="monospace">ej: /resumen-ventas mes=junio</text>

  <text x="130" y="487" font-size="12.5" fill="#3a6b6e">El server ANUNCIA qué Tools/Resources/Prompts ofrece → el cliente los descubre y usa.</text>

  <!-- ===== Features bidireccionales ===== -->
  <text x="110" y="532" font-size="15" font-weight="700" fill="#6b4e9e">Features bidireccionales (el server también pide cosas)</text>
  <g font-size="12">
    <rect x="110" y="542" width="330" height="52" rx="9" fill="#eef2f8" stroke="#6b4e9e"/>
    <text x="126" y="565" font-weight="700" fill="#28323f">↩ Sampling</text><text x="126" y="583" fill="#41506a">el server usa el LLM del cliente</text>

    <rect x="460" y="542" width="330" height="52" rx="9" fill="#eef2f8" stroke="#b8753a"/>
    <text x="476" y="565" font-weight="700" fill="#28323f">🙋 Elicitation</text><text x="476" y="583" fill="#41506a">el server pide input al usuario</text>

    <rect x="810" y="542" width="330" height="52" rx="9" fill="#eef2f8" stroke="#2e7d6b"/>
    <text x="826" y="565" font-weight="700" fill="#28323f">🌱 Roots</text><text x="826" y="583" fill="#41506a">el cliente define qué paths/URIs ve</text>

    <rect x="1160" y="542" width="330" height="52" rx="9" fill="#eef2f8" stroke="#3a5a8c"/>
    <text x="1176" y="565" font-weight="700" fill="#28323f">🔔 Notifications</text><text x="1176" y="583" fill="#41506a">list-changed · progreso</text>
  </g>

  <text x="110" y="620" font-size="12.5" fill="#5a4030">Regla: <tspan font-weight="700">Tools</tspan> = el modelo decide · <tspan font-weight="700">Resources</tspan> = la app/usuario decide qué leer · <tspan font-weight="700">Prompts</tspan> = el usuario invoca.</text>
</svg>
