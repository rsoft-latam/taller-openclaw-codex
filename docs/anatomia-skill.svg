<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="z" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 z" fill="#4b2e22"/></marker>
    <marker id="w" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 z" fill="#ffffff"/></marker>
  </defs>
  <rect x="0" y="0" width="1600" height="600" fill="#fff8ee"/>
  <text x="800" y="38" text-anchor="middle" font-size="27" font-weight="700" fill="#4b2e22">Anatomía de un Skill — del folder al cuerpo</text>
  <text x="800" y="61" text-anchor="middle" font-size="15" fill="#8f4a2f">Qué es cada parte y cómo se unen (progressive disclosure)</text>

  <!-- ===== PANEL 1: EL FOLDER ===== -->
  <text x="55" y="100" font-size="15" font-weight="700" fill="#4b2e22">① EL SKILL FOLDER — qué hace cada parte</text>
  <text x="62" y="122" font-size="13" font-weight="700" fill="#8f4a2f">mi-skill/</text>
  <g font-size="12.5">
    <rect x="62" y="130" width="450" height="40" rx="7" fill="#f3dcc2" stroke="#8f4a2f"/>
    <text x="76" y="155" fill="#3a2418" font-weight="700">📄 SKILL.md</text><text x="190" y="155" fill="#5a4030">instrucciones del skill</text>
    <rect x="430" y="140" width="72" height="20" rx="10" fill="#2f6f73"/><text x="466" y="154" fill="#fff" font-size="10" text-anchor="middle">D + A</text>

    <rect x="62" y="176" width="450" height="38" rx="7" fill="#f3dcc2" stroke="#8f4a2f"/>
    <text x="76" y="200" fill="#3a2418" font-weight="700">📁 scripts/</text><text x="180" y="200" fill="#5a4030">código que se EJECUTA</text>
    <rect x="448" y="185" width="54" height="20" rx="10" fill="#4b2e22"/><text x="475" y="199" fill="#fff" font-size="10" text-anchor="middle">Exec</text>

    <rect x="62" y="220" width="450" height="38" rx="7" fill="#f3dcc2" stroke="#8f4a2f"/>
    <text x="76" y="244" fill="#3a2418" font-weight="700">📁 references/</text><text x="200" y="244" fill="#5a4030">doc detallada on-demand</text>
    <rect x="448" y="229" width="54" height="20" rx="10" fill="#4b2e22"/><text x="475" y="243" fill="#fff" font-size="10" text-anchor="middle">Exec</text>

    <rect x="62" y="264" width="450" height="38" rx="7" fill="#f3dcc2" stroke="#8f4a2f"/>
    <text x="76" y="288" fill="#3a2418" font-weight="700">📁 templates/</text><text x="200" y="288" fill="#5a4030">plantillas de salida</text>
    <rect x="448" y="273" width="54" height="20" rx="10" fill="#4b2e22"/><text x="475" y="287" fill="#fff" font-size="10" text-anchor="middle">Exec</text>

    <rect x="62" y="308" width="450" height="38" rx="7" fill="#f3dcc2" stroke="#8f4a2f"/>
    <text x="76" y="332" fill="#3a2418" font-weight="700">📁 assets/</text><text x="180" y="332" fill="#5a4030">imágenes / datos estáticos</text>
    <rect x="448" y="317" width="54" height="20" rx="10" fill="#4b2e22"/><text x="475" y="331" fill="#fff" font-size="10" text-anchor="middle">Exec</text>
  </g>

  <!-- zoom 1 -> 2 -->
  <path d="M512 150 C 535 150, 540 220, 560 230" fill="none" stroke="#4b2e22" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#z)"/>
  <text x="528" y="180" font-size="10.5" fill="#4b2e22" transform="rotate(58 528 180)">ampliar</text>

  <!-- ===== PANEL 2: SKILL.md POR DENTRO ===== -->
  <text x="560" y="100" font-size="15" font-weight="700" fill="#4b2e22">② SKILL.md por dentro</text>
  <!-- frontmatter -->
  <rect x="560" y="120" width="455" height="130" rx="10" fill="#2f6f73"/>
  <text x="576" y="144" font-size="14" font-weight="700" fill="#fff">FRONTMATTER (YAML)</text>
  <text x="576" y="167" font-size="12.5" fill="#d7ecee">name · <tspan font-weight="700" fill="#fff">description ★</tspan> · version · tools · model</text>
  <text x="576" y="190" font-size="12" fill="#d7ecee">= metadatos: QUÉ es + CUÁNDO usarlo</text>
  <text x="576" y="212" font-size="12" fill="#d7ecee">(el `description` decide si se activa)</text>
  <rect x="576" y="222" width="200" height="20" rx="10" fill="#1c4446"/><text x="676" y="236" font-size="10.5" fill="#fff" text-anchor="middle">DISCOVERY · ~80 tokens</text>

  <!-- cuerpo -->
  <rect x="560" y="262" width="455" height="92" rx="10" fill="#b8753a"/>
  <text x="576" y="286" font-size="14" font-weight="700" fill="#fff">CUERPO (Markdown)</text>
  <text x="576" y="308" font-size="12.5" fill="#fdeede">las INSTRUCCIONES del skill (lo que sigue el modelo)</text>
  <rect x="576" y="320" width="210" height="20" rx="10" fill="#7a4a22"/><text x="681" y="334" font-size="10.5" fill="#fff" text-anchor="middle">ACTIVACIÓN · &lt;5000 tokens</text>

  <!-- zoom 2 -> 3 -->
  <path d="M1015 308 C 1040 308, 1050 230, 1070 230" fill="none" stroke="#4b2e22" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#z)"/>
  <text x="1030" y="275" font-size="10.5" fill="#4b2e22" transform="rotate(-58 1030 275)">ampliar</text>

  <!-- ===== PANEL 3: EL CUERPO POR DENTRO ===== -->
  <text x="1070" y="100" font-size="15" font-weight="700" fill="#4b2e22">③ El CUERPO por dentro (formato)</text>
  <g font-size="12.5">
    <rect x="1070" y="120" width="470" height="36" rx="7" fill="#fff" stroke="#8f4a2f" stroke-width="1.5"/>
    <text x="1084" y="143" fill="#3a2418"><tspan font-weight="700">Overview</tspan> — qué hace + alcance (H1)</text>

    <rect x="1070" y="160" width="470" height="36" rx="7" fill="#fff" stroke="#8f4a2f" stroke-width="1.5"/>
    <text x="1084" y="183" fill="#3a2418"><tspan font-weight="700">Cuándo activarte</tspan> — triggers (frases-ejemplo)</text>

    <rect x="1070" y="200" width="470" height="36" rx="7" fill="#fff" stroke="#8f4a2f" stroke-width="1.5"/>
    <text x="1084" y="223" fill="#3a2418"><tspan font-weight="700">Datos por defecto</tspan> — inputs (opcional)</text>

    <rect x="1070" y="240" width="470" height="40" rx="7" fill="#f3dcc2" stroke="#8f4a2f" stroke-width="2"/>
    <text x="1084" y="265" fill="#3a2418"><tspan font-weight="700">★ Pasos OBLIGATORIOS</tspan> — el workflow (el corazón)</text>

    <rect x="1070" y="284" width="470" height="36" rx="7" fill="#fff" stroke="#8f4a2f" stroke-width="1.5"/>
    <text x="1084" y="307" fill="#3a2418"><tspan font-weight="700">Reglas</tspan> — guardrails (qué NO hacer)</text>

    <rect x="1070" y="324" width="470" height="36" rx="7" fill="#fff" stroke="#8f4a2f" stroke-width="1.5"/>
    <text x="1084" y="347" fill="#3a2418"><tspan font-weight="700">Ejemplos</tspan> — muestra entrada→salida (opcional)</text>
  </g>

  <!-- ===== BOTTOM: CÓMO SE UNEN (progressive disclosure) ===== -->
  <text x="55" y="408" font-size="15" font-weight="700" fill="#4b2e22">Cómo se unen — se cargan por niveles (progressive disclosure)</text>
  <rect x="55" y="420" width="470" height="74" rx="10" fill="#2f6f73"/>
  <text x="290" y="444" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">① DISCOVERY</text>
  <text x="290" y="466" text-anchor="middle" font-size="12" fill="#d7ecee">name + description (~80 tokens)</text>
  <text x="290" y="484" text-anchor="middle" font-size="11.5" fill="#bfe0e2">"sé que la skill existe"</text>

  <line x1="525" y1="457" x2="558" y2="457" stroke="#4b2e22" stroke-width="2" marker-end="url(#z)"/>

  <rect x="565" y="420" width="470" height="74" rx="10" fill="#b8753a"/>
  <text x="800" y="444" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">② ACTIVACIÓN</text>
  <text x="800" y="466" text-anchor="middle" font-size="12" fill="#fdeede">el CUERPO del SKILL.md (&lt;5000 tokens)</text>
  <text x="800" y="484" text-anchor="middle" font-size="11.5" fill="#f6dcc0">"leo CÓMO se hace"</text>

  <line x1="1035" y1="457" x2="1068" y2="457" stroke="#4b2e22" stroke-width="2" marker-end="url(#z)"/>

  <rect x="1075" y="420" width="465" height="74" rx="10" fill="#4b2e22"/>
  <text x="1307" y="444" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">③ EJECUCIÓN</text>
  <text x="1307" y="466" text-anchor="middle" font-size="12" fill="#f3dcc2">scripts/ · references/ · assets/ (on-demand)</text>
  <text x="1307" y="484" text-anchor="middle" font-size="11.5" fill="#e3c9a8">"uso solo lo que el paso pide"</text>

  <text x="55" y="528" font-size="12.5" fill="#5a4030">Folder → SKILL.md = Frontmatter (①) + Cuerpo (②) · el Cuerpo apunta a scripts/refs (③) cuando un paso los necesita · así no se infla el contexto.</text>
</svg>
